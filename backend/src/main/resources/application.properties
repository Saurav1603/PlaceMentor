# Server
server.port=8080

# H2 In-Memory Database (works on sandbox without MySQL)
spring.datasource.url=jdbc:h2:mem:placementor;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# H2 Console (optional - access at /h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# JWT Configuration
jwt.secret=PlaceMentorSuperSecretKeyThatIsAtLeast256BitsLongForHS256Algorithm2024
jwt.expiration=86400000

# CORS
app.cors.allowed-origins=*
